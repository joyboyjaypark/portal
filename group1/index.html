<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Group1 - 수출 현황</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    .status-bar {
      display: flex; justify-content: space-between; font-size: 12px;
      color: #555; background: #c8d5e3; border-radius: 6px;
      padding: 5px 12px; margin-bottom: 12px;
    }

    /* 분석 섹션 */
    .analytics-panel {
      background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 16px; margin-bottom: 12px;
    }
    .analytics-hdr {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    }
    .analytics-hdr h2 { margin: 0; font-size: 14px; color: #1a3c5e; }
    .analytics-hdr .unit { font-size: 11px; color: #888; }
    #cmp-table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
    #cmp-table th {
      background: #2c5f9e; color: #fff; padding: 7px 10px;
      text-align: center; white-space: nowrap;
    }
    #cmp-table td { padding: 6px 10px; border-bottom: 1px solid #e8edf3; white-space: nowrap; }
    #cmp-table tbody tr:nth-child(odd) { background: #f7f9fc; }
    #cmp-table tbody tr:hover { background: #ddeeff; }
    #cmp-table td:first-child { text-align: left; font-weight: 600; color: #1a3c5e; }
    #cmp-table td:not(:first-child) { text-align: right; }
    .pos { color: #c0392b; font-weight: 700; }
    .neg { color: #2471a3; font-weight: 700; }

    /* 원시 데이터 테이블 */
    .tbl-unit { text-align: right; font-size: 11px; color: #888; margin-bottom: 4px; }
    .table-wrap { overflow: auto; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    #export-table { border-collapse: collapse; width: 100%; font-size: 12.5px; background: #fff; }
    #export-table thead th {
      background: #2c5f9e; color: #fff; padding: 8px 10px;
      text-align: center; white-space: nowrap;
      cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 1;
    }
    #export-table thead th:hover { background: #1a4f8e; }
    #export-table tbody tr:nth-child(odd)  { background: #f7f9fc; }
    #export-table tbody tr:nth-child(even) { background: #fff; }
    #export-table tbody tr:hover { background: #ddeeff; }
    #export-table td {
      padding: 6px 10px; text-align: right;
      border-bottom: 1px solid #e8edf3; white-space: nowrap;
    }
    #export-table td.center { text-align: center; }
    #export-table tbody tr.no-data td { text-align: center; color: #888; padding: 30px; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #ccc; border-top-color: #1a6fc4;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sort-asc::after  { content: " ▲"; font-size: 10px; opacity: .7; }
    .sort-desc::after { content: " ▼"; font-size: 10px; opacity: .7; }

    /* ── 탭 ── */
    .tab-bar {
      display: flex; flex-wrap: wrap; gap: 4px;
      border-bottom: 2px solid #2c5f9e;
      margin-bottom: 14px;
    }
    .tab-btn {
      padding: 7px 15px; font-size: 13px; font-weight: 600;
      color: #2c5f9e; background: #eaf0f9;
      border: 1px solid #c0d0e8; border-bottom: none;
      border-radius: 6px 6px 0 0; cursor: pointer;
      transition: background .15s; white-space: nowrap;
    }
    .tab-btn:hover  { background: #d0e0f5; }
    .tab-btn.active { background: #2c5f9e; color: #fff; border-color: #2c5f9e; }

    /* ── 추이 테이블 ── */
    .trend-table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
    .trend-table th {
      background: #2c5f9e; color: #fff; padding: 7px 10px;
      text-align: center; white-space: nowrap;
    }
    .trend-table td { padding: 6px 10px; border-bottom: 1px solid #e8edf3; white-space: nowrap; }
    .trend-table tbody tr:nth-child(odd)  { background: #f7f9fc; }
    .trend-table tbody tr:hover { background: #ddeeff; }
    .trend-table tr.latest-row { font-weight: 700; background: #fffbe6 !important; }
    .trend-table td:nth-child(1),
    .trend-table td:nth-child(2) { text-align: center; }
    .trend-table td:nth-child(3),
    .trend-table td:nth-child(4),
    .trend-table td:nth-child(5) { text-align: right; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><a href="../index.html" style="color:inherit;text-decoration:none">Portal</a></div>
    <ul class="menu">
      <li class="menu-item active"><a href="../group1/">Group1</a></li>
      <li class="menu-item"><a href="../group2/">Group2</a></li>
      <li class="menu-item"><a href="../group3/">Group3</a></li>
      <li class="menu-item"><a href="../group4/">Group4</a></li>
      <li class="menu-item"><a href="../group5/">Group5</a></li>
      <li class="menu-item"><a href="../group6/">Group6</a></li>
      <li class="menu-item"><a href="../group7/">Group7</a></li>
      <li class="menu-item"><a href="../group8/">Group8</a></li>
      <li class="menu-item"><a href="../group9/">Group9</a></li>
      <li class="menu-item"><a href="../group10/">Group10</a></li>
    </ul>
  </aside>

  <main class="content">
    <header style="margin-bottom:20px">
      <h1 style="margin:0 0 4px">관세청 품목별 월별 민간 수출 현황</h1>
      <p style="margin:0;color:#666;font-size:13px">데이터 출처: data.go.kr — 품목별월별수출실적현황</p>
    </header>

    <div class="status-bar">
      <span id="lbl-status">페이지 로드 중...</span>
      <span id="lbl-count"></span>
    </div>

    <!-- 탭 기반 분석 & 데이터 영역 -->
    <div id="main-tabs" style="display:none">
      <div class="tab-bar" id="tab-bar"></div>
      <div id="tab-panels">
        <!-- 품목 탭 패널: JS에서 동적 생성 -->
        <!-- Data 탭 패널 (정적 DOM) -->
        <div id="panel-data" style="display:none">
          <div class="tbl-unit">단위: 천 달러 (USD thousand)</div>
          <div class="table-wrap">
            <table id="export-table">
              <thead>
                <tr id="thead-row">
                  <th data-col="priodYear">조회년도</th>
                  <th data-col="priodMon">조회년월</th>
                  <th data-col="priodDt">조회일자</th>
                  <th data-col="itemUsdAmt00">전체</th>
                  <th data-col="itemUsdAmt01">반도체</th>
                  <th data-col="itemUsdAmt02">철강제품</th>
                  <th data-col="itemUsdAmt03">승용차</th>
                  <th data-col="itemUsdAmt04">석유제품</th>
                  <th data-col="itemUsdAmt05">무선통신기기</th>
                  <th data-col="itemUsdAmt06">선박</th>
                  <th data-col="itemUsdAmt07">자동차부품</th>
                  <th data-col="itemUsdAmt08">컴퓨터주변기기</th>
                  <th data-col="itemUsdAmt09">정밀기기</th>
                  <th data-col="itemUsdAmt10">가전제품</th>
                </tr>
              </thead>
              <tbody id="tbl-body">
                <tr class="no-data"><td colspan="14">데이터가 없습니다.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    var SERVICE_KEY =
      "Nv0jBnCHJXCT20iu910K/IGnF556Vt2w06icWR2uj66dF73AiTNBXaM7bIS9Nu9" +
      "C0cmB7sGVgpnbCiK01Qkgeg==";
    var BASE_URL =
      "https://apis.data.go.kr/1220000/prlstMmUtPrviExpAcrs/getPrlstMmUtPrviExpAcrs";

    var COLS = [
      "priodYear","priodMon","priodDt",
      "itemUsdAmt00","itemUsdAmt01","itemUsdAmt02","itemUsdAmt03",
      "itemUsdAmt04","itemUsdAmt05","itemUsdAmt06",
      "itemUsdAmt07","itemUsdAmt08","itemUsdAmt09","itemUsdAmt10"
    ];
    var CENTER_COLS = new Set(["priodYear","priodMon","priodDt"]);

    var ITEMS = [
      { col: "itemUsdAmt00", label: "전체" },
      { col: "itemUsdAmt01", label: "반도체" },
      { col: "itemUsdAmt02", label: "철강제품" },
      { col: "itemUsdAmt03", label: "승용차" },
      { col: "itemUsdAmt04", label: "석유제품" },
      { col: "itemUsdAmt05", label: "무선통신기기" },
      { col: "itemUsdAmt06", label: "선박" },
      { col: "itemUsdAmt07", label: "자동차부품" },
      { col: "itemUsdAmt08", label: "컴퓨터주변기기" },
      { col: "itemUsdAmt09", label: "정밀기기" },
      { col: "itemUsdAmt10", label: "가전제품" }
    ];

    var tableData  = [];
    var sortCol    = null;
    var sortAsc    = true;
    var itemCharts = {};   // col -> Chart instance
    var FETCH_N    = 37;   // API 조회 개월 수 (Data 탭)
    var TREND_N    = 25;   // 그래프·비교표 표시 개월 수
    var latestInfo = null; // { mon, dt, mm } — renderTable 하이라이트용

    // ── KST 유틸 ─────────────────────────────────────────────────
    function toYYYYMM(date) {
      var kst = new Date(date.toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
      return String(kst.getFullYear()) + String(kst.getMonth() + 1).padStart(2, "0");
    }
    function subtractMonths(yyyymm, n) {
      var y = parseInt(yyyymm.slice(0, 4), 10);
      var m = parseInt(yyyymm.slice(4, 6), 10) - 1;
      var d = new Date(y, m - n, 1);
      return String(d.getFullYear()) + String(d.getMonth() + 1).padStart(2, "0");
    }
    function fmtMon(yyyymm) {
      return yyyymm.slice(0, 4) + "년 " + parseInt(yyyymm.slice(4)) + "월";
    }

    // ── 공통 계산 ─────────────────────────────────────────────────
    function getVal(row, col) {
      if (!row) return null;
      var v = row[col];
      if (v == null || v === "") return null;
      return parseFloat(v.replace(/,/g, ""));
    }
    function calcRate(curr, base) {
      if (curr == null || base == null || base === 0) return null;
      return (curr - base) / Math.abs(base) * 100;
    }
    function fmtNum(v) { return v == null ? "-" : Math.round(v).toLocaleString(); }
    function fmtRate(v) {
      if (v == null) return "-";
      var sign = v >= 0 ? "+" : "";
      var cls  = v >= 0 ? "pos" : "neg";
      return "<span class='" + cls + "'>" + sign + v.toFixed(1) + "%</span>";
    }
    function nthRowOfMonth(rows, mon, idx) {
      var monthRows = rows.filter(function(r) { return r.priodMon === mon; });
      monthRows.sort(function(a, b) { return a.priodDt.localeCompare(b.priodDt); });
      return monthRows[idx] || null;
    }

    // ── 페이지 로드 시 자동 조회 (버튼 없음) ─────────────────────
    (function initAndSearch() {
      var endYm   = toYYYYMM(new Date());
      var startYm = subtractMonths(endYm, FETCH_N);
      doSearch(startYm, endYm);
    })();

    async function doSearch(strt, end) {

      setLoading(true);
      setStatus('<span class="spinner"></span>데이터를 불러오는 중입니다...', "");

      try {
        var params = new URLSearchParams({
          serviceKey: SERVICE_KEY,
          strtYymm: strt, endYymm: end,
          numOfRows: "500", pageNo: "1"
        });
        var res  = await fetch(BASE_URL + "?" + params);
        var text = await res.text();
        var xml  = new DOMParser().parseFromString(text, "application/xml");

        var code = xml.querySelector("resultCode") ? xml.querySelector("resultCode").textContent : "";
        if (code !== "00") {
          var msg = xml.querySelector("resultMsg") ? xml.querySelector("resultMsg").textContent : "알 수 없는 오류";
          throw new Error("API 오류 [" + code + "]: " + msg);
        }

        tableData = Array.from(xml.querySelectorAll("item")).map(function(item) {
          var row = {};
          for (var child of item.children) {
            row[child.localName] = (child.textContent || "").trim();
          }
          return row;
        });

        renderTabs(tableData);    // 품목별 탭 구성 (latestInfo 설정 포함)
        renderTable(tableData);   // Data 탭 원시 테이블 (latestInfo 필요)
        setStatus("조회 완료 — 시작: " + strt + "  종료: " + end,
                  "총 " + tableData.length.toLocaleString() + "건");
      } catch (e) {
        setStatus("오류가 발생했습니다.", "");
        alert("데이터 조회 중 오류가 발생했습니다.\n\n" + e.message);
      } finally {
        setLoading(false);
      }
    }

    // ── 탭 전체 구성 ─────────────────────────────────────────────
    function renderTabs(rows) {
      var wrap = document.getElementById("main-tabs");
      if (!rows.length) { wrap.style.display = "none"; return; }

      // 최신 행 & 순번 파악
      var latestRow = null;
      rows.forEach(function(row) {
        if (!latestRow ||
            row.priodMon > latestRow.priodMon ||
            (row.priodMon === latestRow.priodMon && row.priodDt > latestRow.priodDt)) {
          latestRow = row;
        }
      });
      var latestMon     = latestRow.priodMon;
      var latestDt      = latestRow.priodDt;
      var latestMonRows = rows.filter(function(r) { return r.priodMon === latestMon; });
      latestMonRows.sort(function(a, b) { return a.priodDt.localeCompare(b.priodDt); });
      var latestIdx = latestMonRows.findIndex(function(r) { return r.priodDt === latestDt; });
      if (latestIdx < 0) latestIdx = latestMonRows.length - 1;

      // latestInfo 저장 (Data 탭 하이라이트용)
      latestInfo = {
        mon: latestMon,
        dt:  latestDt,
        mm:  latestMon.slice(4)   // "04" 등 월 부분
      };

      // 표시할 TREND_N 개월 목록 (최신월 포함, 오름차순)
      var months = [];
      for (var i = TREND_N - 1; i >= 0; i--) {
        months.push(subtractMonths(latestMon, i));
      }

      // 행 캐시 (전월·전년동월용 추가 월도 포함)
      var rowCache = {};
      function cachedRow(mon) {
        if (!(mon in rowCache)) {
          rowCache[mon] = nthRowOfMonth(rows, mon, latestIdx);
        }
        return rowCache[mon];
      }

      // 기존 차트 파괴
      Object.keys(itemCharts).forEach(function(col) {
        if (itemCharts[col]) { itemCharts[col].destroy(); }
      });
      itemCharts = {};

      // ── 탭 버튼 ──────────────────────────────────────────────
      var tabBar = document.getElementById("tab-bar");
      tabBar.innerHTML = "";
      ITEMS.forEach(function(item, i) {
        var btn = document.createElement("span");
        btn.className    = "tab-btn" + (i === 0 ? " active" : "");
        btn.textContent  = item.label;
        btn.dataset.tabid = item.col;
        btn.addEventListener("click", function() {
          switchTab(item.col, rows, months, cachedRow, latestMon);
        });
        tabBar.appendChild(btn);
      });
      var dataBtn = document.createElement("span");
      dataBtn.className    = "tab-btn";
      dataBtn.textContent  = "Data";
      dataBtn.dataset.tabid = "data";
      dataBtn.addEventListener("click", function() {
        switchTab("data", rows, months, cachedRow, latestMon);
      });
      tabBar.appendChild(dataBtn);

      // ── 품목 패널 동적 생성 (Data 패널 앞에 삽입) ─────────────
      var panelsDiv = document.getElementById("tab-panels");
      Array.from(panelsDiv.querySelectorAll(".item-panel")).forEach(function(el) { el.remove(); });
      var dataPanel = document.getElementById("panel-data");

      ITEMS.forEach(function(item, i) {
        var panel = document.createElement("div");
        panel.id        = "panel-" + item.col;
        panel.className = "item-panel";
        panel.style.display = (i === 0) ? "block" : "none";
        panel.innerHTML =
          '<div class="analytics-panel">' +
            '<div class="analytics-hdr">' +
              '<h2>' + item.label + ' &mdash; ' + TREND_N + '개월 추이 분석</h2>' +
              '<span class="unit">단위: 천 달러 (USD thousand) &nbsp;|&nbsp; 빨강=상승 / 파랑=하락</span>' +
            '</div>' +
            '<canvas id="chart-' + item.col + '" height="200"></canvas>' +
          '</div>' +
          '<div class="analytics-panel" style="overflow:auto;margin-top:0">' +
            '<table class="trend-table" id="tbl-' + item.col + '">' +
              '<thead><tr>' +
                '<th>월</th><th>기간</th>' +
                '<th>금액 (천달러)</th>' +
                '<th>전월동기대비</th>' +
                '<th>전년동기대비</th>' +
              '</tr></thead>' +
              '<tbody></tbody>' +
            '</table>' +
          '</div>';
        panelsDiv.insertBefore(panel, dataPanel);
      });

      // 첫 번째 품목 탭 렌더
      renderItemPanel(ITEMS[0], months, cachedRow, latestMon);
      wrap.style.display = "block";
    }

    // ── 탭 전환 ──────────────────────────────────────────────────
    function switchTab(tabId, rows, months, cachedRow, latestMon) {
      document.querySelectorAll("#tab-bar .tab-btn").forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.tabid === tabId);
      });
      document.querySelectorAll("#tab-panels .item-panel").forEach(function(p) {
        p.style.display = (p.id === "panel-" + tabId) ? "block" : "none";
      });
      document.getElementById("panel-data").style.display = (tabId === "data") ? "block" : "none";

      // 품목 탭이고 미렌더 시 차트+테이블 생성
      var item = ITEMS.find(function(it) { return it.col === tabId; });
      if (item && !itemCharts[tabId]) {
        renderItemPanel(item, months, cachedRow, latestMon);
      }
    }

    // ── 품목 패널 렌더 (혼합 차트 + 추이 테이블) ─────────────────
    function renderItemPanel(item, months, cachedRow, latestMon) {
      var col = item.col;

      // 14개월 추이 데이터 계산
      var trend = months.map(function(mon) {
        var row     = cachedRow(mon);
        var prevRow = cachedRow(subtractMonths(mon, 1));
        var yoyRow  = cachedRow(subtractMonths(mon, 12));
        var val     = getVal(row, col);
        return {
          mon:     mon,
          priodDt: row ? row.priodDt : null,
          val:     val,
          momRate: calcRate(val, getVal(prevRow, col)),
          yoyRate: calcRate(val, getVal(yoyRow,  col))
        };
      });

      var labels  = trend.map(function(d) { return fmtMon(d.mon); });
      var valData = trend.map(function(d) { return d.val; });
      var momData = trend.map(function(d) { return d.momRate != null ? parseFloat(d.momRate.toFixed(2)) : null; });
      var yoyData = trend.map(function(d) { return d.yoyRate != null ? parseFloat(d.yoyRate.toFixed(2)) : null; });

      // 막대 색상: 연도 그룹별 농도 (최신=진하게, 12개월전=중간, 24개월전=흐리게)
      // months 배열은 오름차순(oldest→latest), 인덱스 TREND_N-1 이 최신
      var barBg  = trend.map(function(d, i) {
        var distFromLatest = (TREND_N - 1) - i;          // 0=latest, 12=1년전, 24=2년전
        var yearGroup      = Math.floor(distFromLatest / 12); // 0,1,2...
        var alpha = Math.max(0.12, 0.80 - yearGroup * 0.28); // 0.80 / 0.52 / 0.24
        return "rgba(44,95,158," + alpha + ")";
      });
      var barBorder = trend.map(function(d, i) {
        var distFromLatest = (TREND_N - 1) - i;
        var yearGroup      = Math.floor(distFromLatest / 12);
        var alpha = Math.max(0.20, 0.95 - yearGroup * 0.30);
        return "rgba(44,95,158," + alpha + ")";
      });

      // 혼합 차트: 막대=금액(좌축), 선=증감률(우축)
      var ctx = document.getElementById("chart-" + col).getContext("2d");
      itemCharts[col] = new Chart(ctx, {
        data: {
          labels: labels,
          datasets: [
            {
              type: "bar",
              label: "금액 (천달러)",
              data: valData,
              backgroundColor: barBg,
              borderColor:     barBorder,
              borderWidth: 1,
              yAxisID: "yVal",
              order: 3
            },
            {
              type: "line",
              label: "전월동기대비 (%)",
              data: momData,
              borderColor:     "rgba(26,111,196,1)",
              backgroundColor: "rgba(26,111,196,0.08)",
              pointRadius: 4, pointHoverRadius: 6,
              tension: 0.3,
              yAxisID: "yRate",
              order: 1
            },
            {
              type: "line",
              label: "전년동기대비 (%)",
              data: yoyData,
              borderColor:     "rgba(192,57,43,1)",
              backgroundColor: "rgba(192,57,43,0.08)",
              pointRadius: 4, pointHoverRadius: 6,
              tension: 0.3,
              yAxisID: "yRate",
              order: 2
            }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "top" },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  var v = ctx.parsed.y;
                  if (v == null) return ctx.dataset.label + ": N/A";
                  if (ctx.datasetIndex === 0) {
                    return ctx.dataset.label + ": " + Math.round(v).toLocaleString();
                  }
                  return ctx.dataset.label + ": " + (v > 0 ? "+" : "") + v.toFixed(1) + "%";
                }
              }
            }
          },
          scales: {
            yVal: {
              type: "linear", position: "left",
              grid: { color: "rgba(0,0,0,0.05)" },
              ticks: {
                callback: function(v) {
                  if (Math.abs(v) >= 1000000) return (v / 1000000).toFixed(1) + "M";
                  if (Math.abs(v) >= 1000)    return (v / 1000).toFixed(0) + "k";
                  return v;
                }
              },
              title: { display: true, text: "금액 (천달러)", font: { size: 11 } }
            },
            yRate: {
              type: "linear", position: "right",
              grid: { drawOnChartArea: false },
              ticks: { callback: function(v) { return (v > 0 ? "+" : "") + v + "%"; } },
              title: { display: true, text: "증감률 (%)", font: { size: 11 } }
            },
            x: { grid: { color: "rgba(0,0,0,0.04)" } }
          }
        }
      });

      // 추이 테이블 렌더
      var tbody = document.querySelector("#tbl-" + col + " tbody");
      tbody.innerHTML = trend.map(function(d) {
        var isLatest = d.mon === latestMon;
        return "<tr" + (isLatest ? ' class="latest-row"' : "") + ">" +
          "<td>" + fmtMon(d.mon) + "</td>" +
          "<td>" + (d.priodDt || "-") + "</td>" +
          "<td>" + fmtNum(d.val) + "</td>" +
          "<td>" + fmtRate(d.momRate) + "</td>" +
          "<td>" + fmtRate(d.yoyRate) + "</td>" +
          "</tr>";
      }).join("");
    }

    // ── Data 탭: 원시 데이터 테이블 ─────────────────────────────
    function renderTable(rows) {
      var tbody = document.getElementById("tbl-body");
      if (!tbody) return;
      if (!rows.length) {
        tbody.innerHTML = '<tr class="no-data"><td colspan="14">조회된 데이터가 없습니다.</td></tr>';
        return;
      }
      // 동기 행 판단: 최신 데이터의 월(MM)과 priodDt가 동일한 행 → 빨간 음영
      var latestMM = latestInfo ? latestInfo.mm : null;
      var latestDt = latestInfo ? latestInfo.dt : null;
      tbody.innerHTML = rows.map(function(row) {
        var isSamePeriod = latestMM && latestDt &&
                           row.priodMon && row.priodMon.slice(4) === latestMM &&
                           row.priodDt  === latestDt;
        var rowStyle = isSamePeriod ? ' style="background:#fde8e8"' : "";
        return "<tr" + rowStyle + ">" + COLS.map(function(col) {
          var v       = row[col] != null ? row[col] : "";
          var cls     = CENTER_COLS.has(col) ? ' class="center"' : "";
          var display = v;
          if (col.startsWith("itemUsdAmt") && v !== "") {
            var num = parseFloat(v.replace(/,/g, ""));
            display = isNaN(num) ? v : num.toLocaleString();
          }
          return "<td" + cls + ">" + display + "</td>";
        }).join("") + "</tr>";
      }).join("");
    }

    // Data 탭 헤더 클릭 정렬
    document.querySelectorAll("#thead-row th").forEach(function(th) {
      th.style.cursor = "pointer";
      th.addEventListener("click", function() { sortBy(th.dataset.col); });
    });

    function sortBy(col) {
      if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
      document.querySelectorAll("#thead-row th").forEach(function(th) {
        th.classList.remove("sort-asc", "sort-desc");
        if (th.dataset.col === col) th.classList.add(sortAsc ? "sort-asc" : "sort-desc");
      });
      var sorted = tableData.slice().sort(function(a, b) {
        var va = (a[col] || "").replace(/,/g, "");
        var vb = (b[col] || "").replace(/,/g, "");
        var na = parseFloat(va), nb = parseFloat(vb);
        if (!isNaN(na) && !isNaN(nb)) return sortAsc ? na - nb : nb - na;
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      });
      renderTable(sorted);
    }

    function setLoading(on) {
      // 버튼 없음 — 상태표시줄만 사용
    }
    function setStatus(msg, count) {
      document.getElementById("lbl-status").innerHTML  = msg;
      document.getElementById("lbl-count").textContent = count;
    }
  </script>
</body>
</html>
