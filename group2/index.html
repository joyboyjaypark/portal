<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Group2 - 공공데이터포털 목록조회</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .input-panel {
      background: #dce3ec; border-radius: 8px; padding: 12px 16px;
      margin-bottom: 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
    }
    .input-panel label { font-size: 13px; color: #333; white-space: nowrap; }
    .input-panel input[type="date"],
    .input-panel input[type="number"] {
      font-size: 13px; padding: 5px 8px;
      border: 1px solid #b0bec5; border-radius: 4px; outline: none;
    }
    .input-panel input[type="date"]   { width: 140px; }
    .input-panel input[type="number"] { width: 70px; }
    .input-panel input[type="text"]   { width: 200px; }
    .input-panel input:focus { border-color: #1a6fc4; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .btn {
      background: #1a6fc4; color: #fff; border: none; border-radius: 4px;
      padding: 7px 18px; font-size: 13px; font-weight: bold;
      cursor: pointer; transition: background .15s;
    }
    .btn:hover:not(:disabled) { background: #145fa8; }
    .btn:disabled { background: #7ea8d4; cursor: default; }
    .btn-secondary { background: #5d7a9e; }
    .btn-secondary:hover:not(:disabled) { background: #4a6480; }
    .btn-danger { background: #c0392b; }
    .btn-danger:hover:not(:disabled) { background: #a93226; }

    .status-bar {
      display: flex; justify-content: space-between; font-size: 12px;
      color: #555; background: #c8d5e3; border-radius: 6px;
      padding: 5px 12px; margin-bottom: 12px;
    }
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid #ccc; border-top-color: #1a6fc4;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .table-wrap { overflow: auto; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    #result-table { border-collapse: collapse; width: 100%; font-size: 12.5px; background: #fff; min-width: 900px; }
    #result-table thead th {
      background: #2c5f9e; color: #fff; padding: 8px 10px;
      text-align: left; white-space: nowrap;
      cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 1;
    }
    #result-table thead th:hover { background: #1a4f8e; }
    #result-table tbody tr:nth-child(odd)  { background: #f7f9fc; }
    #result-table tbody tr:nth-child(even) { background: #fff; }
    #result-table tbody tr:hover { background: #ddeeff; cursor: pointer; }
    #result-table td {
      padding: 6px 10px; border-bottom: 1px solid #e8edf3;
      white-space: nowrap; max-width: 320px;
      overflow: hidden; text-overflow: ellipsis;
    }
    #result-table tbody tr.no-data td { text-align: center; color: #888; padding: 30px; }

    /* 상세 모달 */
    #detail-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 1000;
      align-items: center; justify-content: center;
    }
    #detail-overlay.show { display: flex; }
    #detail-box {
      background: #fff; border-radius: 10px;
      padding: 24px; width: 700px; max-width: 95vw;
      max-height: 80vh; display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    }
    #detail-box h3 { margin: 0 0 14px; font-size: 15px; color: #1a3c5e; }
    #detail-content {
      flex: 1; overflow: auto; font-size: 13.5px; line-height: 2;
      border: 1px solid #dde; border-radius: 6px; padding: 14px 16px;
      background: #f8fafc; white-space: pre-wrap;
    }
    #detail-close {
      align-self: flex-end; margin-top: 14px;
      background: #5d7a9e; color: #fff; border: none; border-radius: 4px;
      padding: 7px 20px; font-size: 13px; cursor: pointer;
    }
    #detail-close:hover { background: #4a6480; }
    #result-table thead th.sort-asc::after  { content: " ▲"; font-size: 10px; opacity: .7; }
    #result-table thead th.sort-desc::after { content: " ▼"; font-size: 10px; opacity: .7; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><a href="../index.html" style="color:inherit;text-decoration:none">Portal</a></div>
    <ul class="menu">
      <li class="menu-item"><a href="../group1/">Group1</a></li>
      <li class="menu-item active"><a href="../group2/">Group2</a></li>
      <li class="menu-item"><a href="../group3/">Group3</a></li>
      <li class="menu-item"><a href="../group4/">Group4</a></li>
      <li class="menu-item"><a href="../group5/">Group5</a></li>
      <li class="menu-item"><a href="../group6/">Group6</a></li>
      <li class="menu-item"><a href="../group7/">Group7</a></li>
      <li class="menu-item"><a href="../group8/">Group8</a></li>
      <li class="menu-item"><a href="../group9/">Group9</a></li>
      <li class="menu-item"><a href="../group10/">Group10</a></li>
    </ul>
  </aside>

  <main class="content">
    <header style="margin-bottom:16px">
      <h1 style="margin:0 0 4px">공공데이터포털 등록 목록 조회</h1>
      <p style="margin:0;color:#666;font-size:13px">데이터 출처: api.odcloud.kr — 공공데이터활용지원센터 목록조회서비스</p>
    </header>

    <div class="input-panel">
      <label for="inp-start">시작일:</label>
      <input id="inp-start" type="date">

      <label for="inp-end">종료일:</label>
      <input id="inp-end" type="date">

      <label for="inp-per">페이지당 건수:</label>
      <input id="inp-per" type="number" value="100" min="10" max="500" step="10">

      <label for="inp-title">서비스명:</label>
      <input id="inp-title" type="text" placeholder="(빈칸=전체)" title="서비스명으로 필터링">
    </div>

    <div class="btn-row">
      <button id="btn-search" class="btn" onclick="onSearch()">조 회</button>
      <button id="btn-clear"  class="btn btn-danger"    onclick="onClear()">결과 지우기</button>
    </div>

    <div class="status-bar">
      <span id="lbl-status">기간을 선택하고 [조회]를 누르세요.</span>
      <span id="lbl-count"></span>
    </div>

    <div class="table-wrap">
      <table id="result-table">
        <thead>
          <tr>
            <th data-col="created_at" style="min-width:100px">등록일</th>
            <th data-col="title"      style="min-width:260px">서비스명</th>
            <th data-col="org_nm"     style="min-width:150px">제공기관</th>
            <th data-col="dept_nm"    style="min-width:150px">관리부서</th>
            <th data-col="api_type"   style="min-width:80px">API유형</th>
            <th data-col="data_format"style="min-width:100px">데이터포맷</th>
            <th data-col="category_nm"style="min-width:130px">분류</th>
            <th data-col="keywords"   style="min-width:180px">키워드</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr class="no-data"><td colspan="8">데이터가 없습니다.</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- 상세 모달 -->
  <div id="detail-overlay" onclick="closeDetail(event)">
    <div id="detail-box">
      <h3 id="detail-title">상세 정보</h3>
      <div id="detail-content"></div>
      <button id="detail-close" onclick="closeDetailBtn()">닫기</button>
    </div>
  </div>

  <script>
    var BASE_URL = "https://api.odcloud.kr/api/15077093/v1/open-data-list";
    var SERVICE_KEY = "Nv0jBnCHJXCT20iu910K/IGnF556Vt2w06icWR2uj66dF73AiTNBXaM7bIS9Nu9" +
                      "C0cmB7sGVgpnbCiK01Qkgeg==";
    var COLS = ["created_at","title","org_nm","dept_nm","api_type","data_format","category_nm","keywords"];

    var allResults = [];
    var isLoading  = false;
    var sortCol    = null;
    var sortAsc    = true;
    var titleFilter = "";

    // 서비스명 실시간 필터
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("inp-title").addEventListener("input", function() {
        titleFilter = this.value.trim().toLowerCase();
        applyTitleFilter();
      });
    });

    function applyTitleFilter() {
      var filtered = titleFilter
        ? allResults.filter(function(it) {
            return String(it.title || "").toLowerCase().indexOf(titleFilter) !== -1;
          })
        : allResults;
      renderRows(filtered);
      document.getElementById("lbl-count").textContent =
        (titleFilter ? filtered.length + " / " : "") + allResults.length + "건";
    }

    // 기본 날짜 설정 (오늘 ~ 30일 전)
    (function initDates() {
      var today     = new Date();
      var monthAgo  = new Date(today);
      monthAgo.setDate(monthAgo.getDate() - 30);
      document.getElementById("inp-end").value   = today.toISOString().slice(0, 10);
      document.getElementById("inp-start").value = monthAgo.toISOString().slice(0, 10);
    })();

    // 헤더 클릭 정렬
    document.querySelectorAll("#result-table thead th").forEach(function(th) {
      th.addEventListener("click", function() {
        var col = th.dataset.col;
        if (!col) return;
        if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
        document.querySelectorAll("#result-table thead th").forEach(function(t) {
          t.classList.remove("sort-asc","sort-desc");
        });
        th.classList.add(sortAsc ? "sort-asc" : "sort-desc");
        var sorted = allResults.slice().sort(function(a, b) {
          var va = String(a[col] || "");
          var vb = String(b[col] || "");
          return sortAsc ? va.localeCompare(vb, "ko") : vb.localeCompare(va, "ko");
        });
        renderRows(sorted);
      });
    });

    async function onSearch() {
      if (isLoading) return;
      var key     = SERVICE_KEY;
      var start   = document.getElementById("inp-start").value.trim();
      var end     = document.getElementById("inp-end").value.trim();
      var perPage = parseInt(document.getElementById("inp-per").value, 10) || 100;

      if (!start) { alert("시작일을 입력하세요."); return; }
      if (!end)   { alert("종료일을 입력하세요."); return; }
      if (start > end) { alert("시작일이 종료일보다 늦을 수 없습니다."); return; }

      onClear();
      isLoading = true;
      setLoading(true);

      try {
        var page  = 1;
        var total = null;
        while (true) {
          setStatus('<span class="spinner"></span>조회 중... page=' + page +
                    (total != null ? " / 총 " + total + "건" : ""), "");

          var titleKw = document.getElementById("inp-title").value.trim();
          var params = new URLSearchParams({
            page:       page,
            perPage:    perPage,
            returnType: "JSON",
            serviceKey: key
          });
          params.append("cond[created_at::GTE]", start);
          params.append("cond[created_at::LTE]", end);
          if (titleKw) params.append("cond[title::LIKE]", titleKw);

          var res  = await fetch(BASE_URL + "?" + params.toString(), {
            headers: {
              "Accept":        "application/json",
              "Authorization": "Infuser " + key
            }
          });
          if (!res.ok) {
            var txt = await res.text();
            throw new Error("HTTP " + res.status + "\n" + txt.slice(0, 400));
          }
          var data  = await res.json();
          var items = data.data || [];
          total = data.totalCount || 0;
          allResults = allResults.concat(items);
          appendRows(items);

          if (!items.length || allResults.length >= total) break;
          page++;
        }
        var titleKwFinal = document.getElementById("inp-title").value.trim();
        var statusExtra = titleKwFinal ? "  서비스명: \"" + titleKwFinal + "\"" : "";
        setStatus("완료: 총 " + total + "건 중 " + allResults.length + "건 표시  (기간: " + start + " ~ " + end + ")" + statusExtra,
                  allResults.length.toLocaleString() + "건");
        applyTitleFilter();
      } catch (e) {
        setStatus("오류가 발생했습니다.", "");
        alert("API 조회 중 오류:\n\n" + e.message);
      } finally {
        isLoading = false;
        setLoading(false);
      }
    }

    function appendRows(items) {
      var tbody = document.getElementById("tbl-body");
      // no-data 행 제거
      var nd = tbody.querySelector(".no-data");
      if (nd) nd.remove();

      items.forEach(function(it, localIdx) {
        var globalIdx = allResults.length - items.length + localIdx;
        var tr = document.createElement("tr");
        tr.dataset.idx = globalIdx;
        tr.addEventListener("click", function() { openDetail(parseInt(tr.dataset.idx)); });
        COLS.forEach(function(col) {
          var td = document.createElement("td");
          td.textContent = it[col] != null ? String(it[col]) : "";
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function renderRows(rows) {
      var tbody = document.getElementById("tbl-body");
      tbody.innerHTML = "";
      if (!rows.length) {
        tbody.innerHTML = '<tr class="no-data"><td colspan="8">데이터가 없습니다.</td></tr>';
        return;
      }
      rows.forEach(function(it, i) {
        var tr = document.createElement("tr");
        tr.dataset.idx = i;
        tr.addEventListener("click", function() { openDetailItem(rows[parseInt(tr.dataset.idx)]); });
        COLS.forEach(function(col) {
          var td = document.createElement("td");
          td.textContent = it[col] != null ? String(it[col]) : "";
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function openDetail(idx) {
      if (idx < 0 || idx >= allResults.length) return;
      openDetailItem(allResults[idx]);
    }
    function openDetailItem(item) {
      var keywords = item.keywords || "";
      document.getElementById("detail-title").textContent =
        (item.title || "") + " — 키워드";
      // 키워드를 쉼표·공백 기준으로 줄바꿈해서 보기 좋게 표시
      var list = keywords.split(/[,，\s]+/).map(function(k){ return k.trim(); })
                         .filter(function(k){ return k.length > 0; });
      document.getElementById("detail-content").textContent =
        list.length ? list.join("\n") : "(키워드 없음)";
      document.getElementById("detail-overlay").classList.add("show");
    }
    function closeDetailBtn() {
      document.getElementById("detail-overlay").classList.remove("show");
    }
    function closeDetail(e) {
      if (e.target === document.getElementById("detail-overlay")) closeDetailBtn();
    }

    function onClear() {
      allResults = [];
      titleFilter = "";
      document.getElementById("inp-title").value = "";
      sortCol = null; sortAsc = true;
      document.querySelectorAll("#result-table thead th").forEach(function(t) {
        t.classList.remove("sort-asc","sort-desc");
      });
      document.getElementById("tbl-body").innerHTML =
        '<tr class="no-data"><td colspan="8">데이터가 없습니다.</td></tr>';
      setStatus("기간을 선택하고 [조회]를 누르세요.", "");
    }

    function setLoading(on) {
      document.getElementById("btn-search").disabled = on;
      document.getElementById("btn-search").textContent = on ? "조회 중..." : "조 회";
    }
    function setStatus(msg, count) {
      document.getElementById("lbl-status").innerHTML  = msg;
      document.getElementById("lbl-count").textContent = count;
    }
  </script>
</body>
</html>
